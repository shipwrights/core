# Post-merge doc update
#
# When a PR merges into {{branches.integration}}, append the merged PR link to
# the matching epic's `## Related PRs` section (if an epic file's frontmatter id
# matches the conventional-commit scope in the PR title). Open a follow-up PR
# labelled {{merge.auto_merge_labels.0}}, then enable auto-merge directly. If
# SHIPWRIGHTS_BOT_TOKEN is configured as a PAT or GitHub App token, the follow-up
# PR can also trigger normal pull_request CI; otherwise it falls back to
# GITHUB_TOKEN.

name: Post-merge doc update

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-epic-doc:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == '{{branches.integration}}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: {{branches.integration}}
          fetch-depth: 0
          token: ${{ secrets.SHIPWRIGHTS_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run epic-update script
        id: update
        env:
          PR_NUMBER:    ${{ github.event.pull_request.number }}
          PR_TITLE:     ${{ github.event.pull_request.title }}
          PR_URL:       ${{ github.event.pull_request.html_url }}
          PR_HEAD_REF:  ${{ github.event.pull_request.head.ref }}
          EPICS_DIR:    "{{backlog.state_dir}}"
          IN_FLIGHT_PATH: "docs/process/in-flight.md"
        run: node scripts/shipwrights/update-epic-after-merge.mjs

      - name: Open follow-up PR with the epic update
        if: steps.update.outputs.changed_files != ''
        env:
          GH_TOKEN:      ${{ secrets.SHIPWRIGHTS_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER:     ${{ github.event.pull_request.number }}
          CHANGED_FILES: ${{ steps.update.outputs.changed_files }}
        run: |
          set -euo pipefail
          BRANCH="chore/ops-doc-update-pr-${PR_NUMBER}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add $CHANGED_FILES
          git commit -m "chore(ops): record merged PR #${PR_NUMBER}"
          git push -u origin "$BRANCH"
          gh pr create \
            --base {{branches.integration}} \
            --head "$BRANCH" \
            --title "chore(ops): record merged PR #${PR_NUMBER}" \
            --body "Auto-generated follow-up to record merged PR #${PR_NUMBER}." \
            --label {{merge.auto_merge_labels.0}}
          FOLLOWUP_PR="$(gh pr view "$BRANCH" --repo "${{ github.repository }}" --json number --jq '.number')"
          gh pr merge --auto --{{merge.strategy}} --delete-branch \
            --repo "${{ github.repository }}" \
            "$FOLLOWUP_PR"
